# COPY THIS TO: Navien07/mykasih/.github/workflows/tracker-sync.yml
#
# This workflow lives in the BUILD repo (Navien07/mykasih), NOT in the tracker app.
# GitHub Actions fire from the repo where the events happen, so it belongs there.
# It signs an event payload with HMAC-SHA256 and POSTs it to the deployed tracker.
#
# Requires repo secrets in Navien07/mykasih (Settings → Secrets and variables → Actions):
#   TRACKER_URL             = https://quins-tracker.vercel.app/api/tracker/sync
#   TRACKER_WEBHOOK_SECRET  = (SAME value as the tracker's GITHUB_WEBHOOK_SECRET on Vercel)
#
# NOTE: GitHub reserves the "GITHUB_" secret-name prefix, so the secret is named
# TRACKER_WEBHOOK_SECRET here even though the tracker app reads it as GITHUB_WEBHOOK_SECRET.
# Only the names differ — the hex value must match on both sides.
name: Quins Tracker Sync
on:
  push:
    tags: ['p2-*', 'v*', 'tracker-live']
  pull_request:
    types: [closed]
    branches: [phase2]
jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Build payload + sign + POST
        env:
          TRACKER_URL: ${{ secrets.TRACKER_URL }}
          SECRET: ${{ secrets.TRACKER_WEBHOOK_SECRET }}
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            TAG="${GITHUB_REF#refs/tags/}"
            BODY=$(jq -nc --arg t "$TAG" --arg s "${{ github.sha }}" --arg u "${{ github.server_url }}/${{ github.repository }}/releases/tag/$TAG" '{event:"tag",tag:$t,sha:$s,url:$u}')
          else
            if [ "${{ github.event.pull_request.merged }}" != "true" ]; then echo "PR not merged, skip"; exit 0; fi
            BODY=$(jq -nc --arg t "${{ github.event.pull_request.title }}" --arg s "${{ github.event.pull_request.merge_commit_sha }}" --arg u "${{ github.event.pull_request.html_url }}" '{event:"pr_merged",pr_title:$t,sha:$s,url:$u}')
          fi
          SIG=$(printf '%s' "$BODY" | openssl dgst -sha256 -hmac "$SECRET" | sed 's/^.* //')
          curl -fsS -X POST "$TRACKER_URL" -H "Content-Type: application/json" -H "x-tracker-signature: $SIG" -d "$BODY"
